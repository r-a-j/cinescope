<ion-header class="ion-no-border">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-back-button defaultHref="/" class="morph-back-btn"></ion-back-button>
        </ion-buttons>
        <h1 class="settings-title">System Settings</h1>
    </ion-toolbar>
</ion-header>

<ion-content color="background" [fullscreen]="true">
    <div class="settings-viewport">
        <div class="settings-container">
            <div class="settings-group">
                <h3 class="group-title">Account & Security</h3>
                <ion-list lines="none" class="glass-list">
                    <ion-item button detail="false">
                        <ion-icon name="shield-checkmark-outline" slot="start"></ion-icon>
                        <ion-label>Vault Encryption</ion-label>
                        <ion-icon name="chevron-forward-outline" slot="end" class="chevron"></ion-icon>
                    </ion-item>
                    <ion-item button detail="false">
                        <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
                        <ion-label>Cloud Sync</ion-label>
                        <ion-icon name="chevron-forward-outline" slot="end" class="chevron"></ion-icon>
                    </ion-item>
                </ion-list>
            </div>

            <div class="settings-group">
                <h3 class="group-title">Preferences</h3>
                <ion-list lines="none" class="glass-list">
                    <ion-item button detail="false">
                        <ion-icon name="color-palette-outline" slot="start"></ion-icon>
                        <ion-label>Chroma-Sync Theme</ion-label>
                        <ion-icon name="chevron-forward-outline" slot="end" class="chevron"></ion-icon>
                    </ion-item>
                    <ion-item button detail="false">
                        <ion-icon name="notifications-outline" slot="start"></ion-icon>
                        <ion-label>AI Insights Alerts</ion-label>
                        <ion-icon name="chevron-forward-outline" slot="end" class="chevron"></ion-icon>
                    </ion-item>
                </ion-list>
            </div>

            <div class="settings-group">
                <h3 class="group-title">Maintenance</h3>
                <ion-list lines="none" class="glass-list">
                    <ion-item button detail="false" class="danger-item">
                        <ion-icon name="trash-outline" slot="start"></ion-icon>
                        <ion-label>Clear Local Cache</ion-label>
                    </ion-item>
                    <ion-item button detail="false">
                        <ion-icon name="information-circle-outline" slot="start"></ion-icon>
                        <ion-label>About Cinescope</ion-label>
                    </ion-item>
                </ion-list>
            </div>
        </div>
    </div>
</ion-content>
