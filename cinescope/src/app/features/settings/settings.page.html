

<ion-content color="background" [fullscreen]="true" class="immersive-settings">
    <div class="background-mesh"></div>
    
    <div class="settings-viewport">
        <header class="page-header">
            <h1 class="display-title">System Settings</h1>
            <p class="display-subtitle">Configure your digital environment</p>
        </header>

        <div class="settings-container">
            <div class="settings-group">
                <h3 class="group-title">Account & Security</h3>
                <ion-list lines="none" class="glass-list">
                    <ion-item button detail="false">
                        <ion-icon name="shield-checkmark-outline" slot="start"></ion-icon>
                        <ion-label>Vault Encryption</ion-label>
                        <ion-icon name="chevron-forward-outline" slot="end" class="chevron"></ion-icon>
                    </ion-item>
                    <ion-item button detail="false">
                        <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
                        <ion-label>Cloud Sync</ion-label>
                        <ion-icon name="chevron-forward-outline" slot="end" class="chevron"></ion-icon>
                    </ion-item>
                </ion-list>
            </div>

            <div class="settings-group">
                <h3 class="group-title">Preferences</h3>
                <ion-list lines="none" class="glass-list">
                    <div class="theme-switcher-container">
                        <div class="theme-switcher glassmorphism">
                            <div class="theme-option" 
                                 [class.active]="themeService.themeMode() === 'light'"
                                 (click)="themeService.setTheme('light')">
                                <ion-icon name="sunny-outline"></ion-icon>
                                <span>Light</span>
                            </div>
                            <div class="theme-option" 
                                 [class.active]="themeService.themeMode() === 'dark'"
                                 (click)="themeService.setTheme('dark')">
                                <ion-icon name="moon-outline"></ion-icon>
                                <span>Dark</span>
                            </div>
                            <div class="theme-option" 
                                 [class.active]="themeService.themeMode() === 'system'"
                                 (click)="themeService.setTheme('system')">
                                <ion-icon name="contrast-outline"></ion-icon>
                                <span>Auto</span>
                            </div>
                            <div class="active-indicator" [attr.data-mode]="themeService.themeMode()"></div>
                        </div>
                    </div>
                    <ion-item button detail="false">
                        <ion-icon name="notifications-outline" slot="start"></ion-icon>
                        <ion-label>AI Insights Alerts</ion-label>
                        <ion-icon name="chevron-forward-outline" slot="end" class="chevron"></ion-icon>
                    </ion-item>
                </ion-list>
            </div>

            <div class="settings-group">
                <h3 class="group-title">Maintenance</h3>
                <ion-list lines="none" class="glass-list">
                    <ion-item button detail="false" class="danger-item">
                        <ion-icon name="trash-outline" slot="start"></ion-icon>
                        <ion-label>Clear Local Cache</ion-label>
                    </ion-item>
                    <ion-item button detail="false">
                        <ion-icon name="information-circle-outline" slot="start"></ion-icon>
                        <ion-label>About Cinescope</ion-label>
                    </ion-item>
                </ion-list>
            </div>
        </div>
    </div>
</ion-content>
