<ion-tabs>
    <ion-tab-bar slot="bottom">
        <!-- Three.js Canvas is now the background of the Tab Bar -->
        <div class="canvas-container" #canvasContainer></div>

        <ion-tab-button tab="pulse" href="/tabs/pulse">
            <ion-icon [name]="'flash'"></ion-icon>
        </ion-tab-button>

        <ion-tab-button tab="oracle" href="/tabs/oracle">
            <ion-icon [name]="'sparkles'"></ion-icon>
        </ion-tab-button>

        <ion-tab-button tab="vault" href="/tabs/vault">
            <ion-icon [name]="'grid'"></ion-icon>
        </ion-tab-button>

        <ion-tab-button tab="social" href="/tabs/social">
            <ion-icon [name]="'people'"></ion-icon>
        </ion-tab-button>

        <ion-tab-button tab="search" href="/tabs/search">
            <ion-icon [name]="'search'"></ion-icon>
        </ion-tab-button>

        <ion-tab-button tab="identity" href="/tabs/identity">
            <ion-icon [name]="'person'"></ion-icon>
        </ion-tab-button>

        <ion-tab-button tab="settings" href="/tabs/settings">
            <ion-icon [name]="'settings'"></ion-icon>
        </ion-tab-button>

    </ion-tab-bar>
</ion-tabs>
