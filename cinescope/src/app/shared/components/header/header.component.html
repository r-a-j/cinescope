<ion-header class="ion-no-border">
    <ion-toolbar>
        <div slot="start" class="logo-container">
            <img src="assets/images/logo-header.svg" alt="CINESCOPE" class="header-logo" fetchpriority="high" />
        </div>

        <ion-buttons slot="end">
            <ion-button class="action-btn" aria-label="Search" (click)="openSearch()">
                <ion-icon name="search-outline" slot="icon-only"></ion-icon>
            </ion-button>
            <ion-button class="action-btn" aria-label="Settings" (click)="openSettings()">
                <ion-icon name="settings-outline" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-buttons>

    </ion-toolbar>
</ion-header>
