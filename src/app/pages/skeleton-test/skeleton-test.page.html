<app-header class="timeline-header"></app-header>

<ion-content [fullscreen]="true" [scrollY]="false" class="timeline-content">

    <div class="background-content">

        <div class="cinematic-header">
            <div class="origin-flare"></div>
            <h1 class="title-card">The Archive</h1>
            <p class="subtitle">Cinematic history etched in time</p>
        </div>

        <div class="timeline-container">
            <div class="timeline-axis"></div>

            <ng-container *ngFor="let node of timelineNodes; let i = index">

                <div class="timeline-date">
                    <span>{{ node.date | date:'mediumDate' }}</span>
                </div>

                <div class="timeline-row alternating-row" [class.left-align]="i % 2 === 0"
                    [class.right-align]="i % 2 !== 0">
                    <div class="intersect-dot"></div>

                    <div class="timeline-content stacked-node-ui">
                        <div class="carousel">
                            <div class="poster-placeholder"
                                *ngFor="let item of asStacked(node).items | slice:0:3; let cardIndex = index; trackBy: trackById"
                                [class.card-0]="cardIndex === 0" [class.card-1]="cardIndex === 1"
                                [class.card-2]="cardIndex === 2" [class.top-card]="cardIndex === 0"
                                [attr.data-node-index]="i" (click)="onCardClick(item)">

                                <img [src]="item.poster_path ? ('https://image.tmdb.org/t/p/w300' + item.poster_path) : 'assets/placeholder.png'"
                                    [alt]="item.title || item.name" />

                            </div>
                        </div>
                    </div>
                    <div class="timeline-info">
                        <h2 class="movie-title">{{ asStacked(node).items[0].title || asStacked(node).items[0].name }}
                        </h2>
                    </div>
                </div>
            </ng-container>

            <div class="timeline-end">
                <div class="end-ring"></div>
                <span class="end-text">Origin</span>
            </div>

        </div>
    </div>
</ion-content>

<app-bottom-sheet></app-bottom-sheet>
