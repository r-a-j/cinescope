<ion-header>
    <ion-toolbar>
        <ion-title>Skeleton Test</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" [scrollY]="false">
    <div class="background-content">
        <h1>Background Timeline</h1>
        <p>This timeline sits behind the sheet.</p>

        <div class="timeline-container">
            <div class="timeline-axis"></div>

            <ng-container *ngFor="let node of timelineNodes; let i = index">
                <!-- Single Node UI -->
                <div *ngIf="node.type === 'single'" class="timeline-row single-row" [class.left-align]="i % 2 === 0"
                    [class.right-align]="i % 2 !== 0">
                    <div class="intersect-dot"></div>
                    <div class="timeline-content single-node-ui">
                        <div class="poster-placeholder">
                            <span>{{ asSingle(node).item.title || 'Movie Title' }}</span>
                        </div>
                    </div>
                </div>

                <!-- Stacked Node UI -->
                <div *ngIf="node.type === 'stacked'" class="timeline-row stacked-row">
                    <div class="intersect-dot"></div>
                    <div class="timeline-content stacked-node-ui">
                        <div class="carousel">
                            <div class="poster-placeholder"
                                *ngFor="let item of asStacked(node).items | slice:0:3; let cardIndex = index; trackBy: trackById"
                                [class.card-0]="cardIndex === 0" [class.card-1]="cardIndex === 1"
                                [class.card-2]="cardIndex === 2" [class.top-card]="cardIndex === 0"
                                [attr.data-node-index]="i" (click)="onCardClick(item)">
                                <span>{{ item.title || 'Movie Title' }}</span>
                            </div>
                        </div>
                        <div class="pagination-dots">
                            <span class="dot" *ngFor="let item of asStacked(node).items; let first = first"
                                [class.active]="first"></span>
                        </div>
                    </div>
                </div>
            </ng-container>

        </div>
    </div>
</ion-content>

<app-bottom-sheet></app-bottom-sheet>
