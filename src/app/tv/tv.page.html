<app-header></app-header>

<ion-modal class="glass-modal" [isOpen]="filterOpen" [initialBreakpoint]="0.65" [breakpoints]="[0, 0.65, 0.9]"
  (didDismiss)="filterOpen = false">
  <ng-template>

    <ion-header class="ion-no-border">
      <ion-toolbar style="--background: transparent;">
        <ion-title style="font-weight: 700; font-size: 16px; letter-spacing: 1px;">SORT & FILTER</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="filterOpen = false" color="light" style="font-weight: 700;">DONE</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="filter-content">

      <h3 class="filter-heading">Sort By</h3>
      <div class="chip-group">
        <ion-chip [class.active-chip]="sortBy === 'default'" (click)="sortBy = 'default'">
          <ion-label>Recently Added</ion-label>
        </ion-chip>
        <ion-chip [class.active-chip]="sortBy === 'title'" (click)="sortBy = 'title'">
          <ion-label>A-Z</ion-label>
        </ion-chip>
        <ion-chip [class.active-chip]="sortBy === 'rating'" (click)="sortBy = 'rating'">
          <ion-label>Highest Rated</ion-label>
        </ion-chip>
        <ion-chip [class.active-chip]="sortBy === 'date'" (click)="sortBy = 'date'">
          <ion-label>Newest Release</ion-label>
        </ion-chip>
      </div>

      <h3 class="filter-heading">Genres</h3>
      <div class="chip-group">
        <ion-chip *ngFor="let g of genres" [class.active-chip]="selectedGenres.has(g)" (click)="toggleGenre(g)">
          <ion-label>{{ g }}</ion-label>
        </ion-chip>
      </div>

      <div class="clear-action">
        <ion-button expand="block" color="medium" fill="clear" (click)="clearFilter()"
          [disabled]="selectedGenres.size === 0 && sortBy === 'default'">
          Reset All Filters
        </ion-button>
      </div>

    </ion-content>
  </ng-template>
</ion-modal>

<ion-content>

  <!-- Sticky Control Bar -->
  <div class="control-bar">
    <ion-button fill="clear" color="light" class="control-btn" (click)="toggleSelectionMode()">
      {{ selectionMode ? 'Cancel' : 'Select' }}
    </ion-button>

    <ion-segment [(ngModel)]="segment" class="custom-segment">
      <ion-segment-button value="watchlist">
        <ion-icon name="bookmark"></ion-icon>
      </ion-segment-button>
      <ion-segment-button value="watched">
        <ion-icon name="checkmark-done"></ion-icon>
      </ion-segment-button>
    </ion-segment>

    <ion-button fill="clear" color="light" class="control-btn" (click)="openFilter($event)">
      <ion-icon name="options-outline"></ion-icon>
    </ion-button>
  </div>

  <div class="media-grid">
    <div class="media-item animate__animated animate__flipInY animate__faster"
      *ngFor="let tv of getCurrentTv(); trackBy: trackById" (click)="onTvClick(tv.id)">
      <img [src]="tv.poster_path ? ('https://image.tmdb.org/t/p/w300' + tv.poster_path) : 'assets/placeholder.png'"
        [alt]="tv.name" />

      <ion-checkbox *ngIf="selectionMode" [checked]="selectedIds.has(tv.id!)" (click)="toggleSelect(tv.id!)"
        class="media-checkbox">
      </ion-checkbox>
    </div>
  </div>

</ion-content>

<!-- Action Footer -->
<ion-footer *ngIf="selectionMode" class="selection-footer ion-no-border">
  <ion-toolbar>
    <ion-button expand="block" color="danger" slot="start" fill="clear" (click)="removeSelected()" class="action-btn">
      Remove
    </ion-button>
    <ion-button expand="block" color="primary" slot="end" fill="clear" (click)="moveSelectedToWatched()"
      class="action-btn">
      Move to Watched
    </ion-button>
  </ion-toolbar>
</ion-footer>
