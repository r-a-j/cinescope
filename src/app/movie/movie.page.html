<app-header></app-header>

<ion-modal class="glass-modal" [isOpen]="filterOpen" [initialBreakpoint]="0.65" [breakpoints]="[0, 0.65, 0.9]"
  (didDismiss)="filterOpen = false">
  <ng-template>

    <ion-header class="ion-no-border">
      <ion-toolbar style="--background: transparent;">
        <ion-title style="font-weight: 700; font-size: 16px; letter-spacing: 1px;">SORT & FILTER</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="filterOpen = false" color="light" style="font-weight: 700;">DONE</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="filter-content">

      <h3 class="filter-heading">Sort By</h3>
      <div class="chip-group">
        <ion-chip [class.active-chip]="sortBy === 'default'" (click)="sortBy = 'default'">
          <ion-label>Recently Added</ion-label>
        </ion-chip>
        <ion-chip [class.active-chip]="sortBy === 'title'" (click)="sortBy = 'title'">
          <ion-label>A-Z</ion-label>
        </ion-chip>
        <ion-chip [class.active-chip]="sortBy === 'rating'" (click)="sortBy = 'rating'">
          <ion-label>Highest Rated</ion-label>
        </ion-chip>
        <ion-chip [class.active-chip]="sortBy === 'date'" (click)="sortBy = 'date'">
          <ion-label>Newest Release</ion-label>
        </ion-chip>
      </div>

      <h3 class="filter-heading">Genres</h3>
      <div class="chip-group">
        <ion-chip *ngFor="let g of genres" [class.active-chip]="selectedGenres.has(g)" (click)="toggleGenre(g)">
          <ion-label>{{ g }}</ion-label>
        </ion-chip>
      </div>

      <div class="clear-action">
        <ion-button expand="block" color="medium" fill="clear" (click)="clearFilter()"
          [disabled]="selectedGenres.size === 0 && sortBy === 'default'">
          Reset All Filters
        </ion-button>
      </div>

    </ion-content>
  </ng-template>
</ion-modal>

<ion-content class="ion-padding">

  <div class="segment-wrapper">
    <div class="left-slot">
      <ion-buttons *ngIf="selectionMode">
        <ion-button color="danger" (click)="removeSelected()">Remove</ion-button>
        <ion-button color="primary" (click)="moveSelectedToWatched()">Watched</ion-button>
        <ion-button color="medium" (click)="clearSelection()">Cancel</ion-button>
      </ion-buttons>
    </div>

    <ion-segment [(ngModel)]="segment" class="custom-segment">
      <ion-segment-button value="watchlist">
        <ion-icon name="bookmark"></ion-icon>
      </ion-segment-button>
      <ion-segment-button value="watched">
        <ion-icon name="checkmark-done"></ion-icon>
      </ion-segment-button>
    </ion-segment>
  </div>

  <div class="media-grid">
    <div class="media-item animate__animated animate__flipInY animate__faster"
      *ngFor="let movie of getCurrentMovies(); trackBy: trackById" (click)="onMovieClick(movie.id)">
      <img
        [src]="movie.poster_path ? ('https://image.tmdb.org/t/p/w300' + movie.poster_path) : 'assets/placeholder.png'"
        [alt]="movie.title" />

      <ion-checkbox *ngIf="selectionMode" [checked]="selectedIds.has(movie.id!)" (click)="toggleSelect(movie.id!)"
        class="media-checkbox">
      </ion-checkbox>
    </div>
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end" *ngIf="!selectionMode">
    <ion-fab-button class="fab-filter" (click)="openFilter($event)">
      <ion-icon name="options"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end" class="fab-test" *ngIf="!selectionMode">
    <ion-fab-button (click)="goToSkeletonTest()" color="secondary">
      <ion-icon name="construct"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end" class="fab-edit" *ngIf="!selectionMode">
    <ion-fab-button class="fab-edit-btn" (click)="toggleSelectionMode()">
      <ion-icon name="trash"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
